<!DOCTYPE html>
<html>
<head>
<style>
.container{
    position: relative;
}

.container img{
    width: 100%;
}

.text{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 40px;
}
</style>
</head>
<body>

<div class="container">
    <img src="assets/banner.jpg" alt="Banner">
    <div class="text">Welcome</div>
</div>

</body>
</html>
